description: >-
  Campbell Soup Company (now rebranded as The Campbell's Company) is a
  manufacturer and marketer of high-quality branded convenience food
  products, including soups, simple meals, beverages, snacks, and packaged
  fresh foods under brands such as Campbell's, Swanson, Pace, Prego,
  V8, Pepperidge Farm, Goldfish, and Snyder's of Hanover. Historically
  Campbell's ran a public Campbell's Kitchen Developer API exposing recipes,
  products, UPC lookup, and nutrition data for web and mobile integrations,
  though current availability of the public developer portal varies and
  typically requires partner access.
apis:
  - aid: campbell-soup:campbells-kitchen-api
    name: Campbell's Kitchen API
    description: >-
      The Campbell's Kitchen API exposes the Campbell's Kitchen recipe and
      product catalog — including thousands of recipes across Campbell's,
      Swanson, Pace, Prego, and Pepperidge Farm brands — to developers
      building search-based recipe and product applications. The API
      supports search by key ingredients, product UPC, and keywords, and
      returns recipe details, photos, ratings, and updated Nutrition Facts
      panel data.
    humanURL: https://developer.campbellskitchen.com/
